<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Homepage</title>
    <style>
      :root {
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f7f7;
        color: #222;
      }

      main {
        text-align: center;
        padding: 2rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
      }

      p {
        margin: 0 0 1.25rem;
      }

      a {
        display: inline-block;
        padding: 0.6rem 1rem;
        border-radius: 8px;
        text-decoration: none;
        background: #111;
        color: #fff;
      }

      a:hover {
        background: #333;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Welcome</h1>
      <p>This is my very simple homepage.</p>
      <a href="https://github.com">Visit GitHub</a>
    </main>
  </body>
</html>
